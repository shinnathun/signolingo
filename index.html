<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASL Sign Language Quiz</title>
<style>
  /* ── EDIT THIS LINE with your Worker URL after deploying ── */
  /* See setup instructions below                             */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #111; min-height: 100vh; }
  .quiz-wrap { padding: 1.5rem; max-width: 640px; margin: 0 auto; }
  .progress-bar-bg { height: 4px; background: #e5e7eb; border-radius: 4px; margin-bottom: 1.5rem; }
  .progress-bar-fill { height: 4px; background: #3B82F6; border-radius: 4px; transition: width 0.4s ease; }
  .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .status-label { font-size: 13px; color: #6b7280; }
  .score-badge { font-size: 13px; font-weight: 500; color: #1D4ED8; background: #DBEAFE; padding: 3px 10px; border-radius: 20px; }
  .sign-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
  .sign-image-area { display: flex; align-items: center; justify-content: center; min-height: 140px; }
  .sign-image-area img { max-width: 200px; max-height: 200px; object-fit: contain; border-radius: 8px; }
  .sign-question { font-size: 14px; color: #6b7280; margin-top: 0.75rem; }
  .hint-text { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .choice-btn { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 0.75rem 1rem; font-size: 15px; font-weight: 500; color: #111; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .choice-btn:hover:not(:disabled) { background: #f9fafb; border-color: #d1d5db; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: #DCFCE7 !important; border: 2px solid #16A34A !important; color: #14532D !important; }
  .choice-btn.wrong { background: #FEE2E2 !important; border: 2px solid #DC2626 !important; color: #7F1D1D !important; }
  .feedback { font-size: 14px; font-weight: 500; min-height: 20px; margin-bottom: 0.75rem; text-align: center; }
  .feedback.correct { color: #16A34A; }
  .feedback.wrong { color: #DC2626; }
  .next-btn { width: 100%; padding: 0.75rem; border-radius: 8px; background: #3B82F6; border: none; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; display: none; }
  .next-btn:hover { opacity: 0.9; }
  .result-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; }
  .result-score { font-size: 36px; font-weight: 500; }
  .result-label { font-size: 15px; color: #6b7280; margin: 0.25rem 0 1rem; }
  .result-msg { font-size: 14px; color: #9ca3af; margin-bottom: 1.5rem; }
  .restart-btn { padding: 0.75rem 2rem; border-radius: 8px; background: #3B82F6; border: none; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
  .mode-header { display: flex; gap: 8px; margin-bottom: 1rem; }
  .mode-tab { flex: 1; padding: 0.5rem; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; font-size: 13px; color: #6b7280; cursor: pointer; }
  .mode-tab.active { background: #DBEAFE; border-color: #93C5FD; color: #1D4ED8; font-weight: 500; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; }
  .manage-btn { padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; font-size: 13px; color: #6b7280; cursor: pointer; }
  .manage-btn:hover { background: #f9fafb; }
  .img-manager { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .img-manager-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .img-manager-title { font-size: 14px; font-weight: 500; }
  .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); gap: 8px; max-height: 320px; overflow-y: auto; }
  .img-slot { border: 1.5px dashed #d1d5db; border-radius: 8px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; font-size: 11px; color: #9ca3af; gap: 3px; transition: border-color 0.15s; }
  .img-slot:hover { border-color: #3B82F6; }
  .img-slot.has-image { border-style: solid; border-color: #16A34A; }
  .img-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
  .img-slot .slot-label { position: relative; z-index: 1; font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.85); padding: 1px 4px; border-radius: 4px; color: #111; }
  .img-slot .remove-btn { position: absolute; top: 2px; right: 2px; z-index: 2; background: #DC2626; color: #fff; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; line-height: 1; }
  .img-slot.has-image:hover .remove-btn { display: flex; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-tag { padding: 3px 10px; border-radius: 20px; border: 1px solid #e5e7eb; font-size: 12px; color: #6b7280; cursor: pointer; background: #fff; }
  .filter-tag.active { background: #DBEAFE; border-color: #93C5FD; color: #1D4ED8; }
  .img-count-badge { font-size: 11px; color: #9ca3af; }
  .pw-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .pw-input { flex: 1; padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid #e5e7eb; font-size: 13px; }
  .pw-btn { padding: 0.5rem 1rem; border-radius: 8px; background: #3B82F6; border: none; color: #fff; font-size: 13px; cursor: pointer; }
  .pw-status { font-size: 12px; margin-left: 4px; }
  .pw-status.ok { color: #16A34A; }
  .pw-status.err { color: #DC2626; }
  .uploading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #6b7280; border-radius: 6px; }
  .config-banner { background: #FEF3C7; border: 1px solid #FCD34D; border-radius: 8px; padding: 0.75rem 1rem; font-size: 13px; color: #92400E; margin-bottom: 1rem; }
  .config-banner a { color: #1D4ED8; }
</style>
</head>
<body>
<div class="quiz-wrap">

  <!-- ⚠️ SETUP: Replace the placeholder below with your actual Worker URL -->
  <!-- After deploying the Worker, it looks like: https://asl-quiz-api.YOUR-NAME.workers.dev -->
  <div class="config-banner" id="configBanner">
    ⚙️ <strong>Setup needed:</strong> Open this file in a text editor and replace <code>YOUR_WORKER_URL</code> on line 1 of the script below with your Cloudflare Worker URL.
  </div>

  <div class="mode-header">
    <button class="mode-tab active" onclick="setMode('letters')" id="tabLetters">Letters A–Z</button>
    <button class="mode-tab" onclick="setMode('numbers')" id="tabNumbers">Numbers 0–9</button>
  </div>

  <div id="imgManager" style="display:none;">
    <div class="img-manager">
      <div class="img-manager-header">
        <span class="img-manager-title">Upload sign images</span>
        <span class="img-count-badge" id="imgCount">Loading...</span>
      </div>

      <div class="pw-row">
        <input class="pw-input" type="password" id="pwInput" placeholder="Admin password" autocomplete="current-password"/>
        <button class="pw-btn" onclick="savePassword()">Unlock</button>
        <span class="pw-status" id="pwStatus"></span>
      </div>

      <div class="filter-row">
        <button class="filter-tag active" onclick="setFilter('all',this)">All</button>
        <button class="filter-tag" onclick="setFilter('letters',this)">Letters</button>
        <button class="filter-tag" onclick="setFilter('numbers',this)">Numbers</button>
        <button class="filter-tag" onclick="setFilter('missing',this)">No image yet</button>
      </div>
      <div class="img-grid" id="imgGrid"></div>
      <p style="font-size:12px; color:#9ca3af; margin-top:10px;">Click a slot to upload. Max 5MB per image. Changes persist for all visitors.</p>
    </div>
  </div>

  <div id="quizArea"></div>
</div>

<script>
// ── REPLACE THIS with your Cloudflare Worker URL ──────────────────────────────
const WORKER_URL = "https://asl-quiz-api.shinnathun.workers.dev";
// e.g. "https://asl-quiz-api.your-name.workers.dev"
// ─────────────────────────────────────────────────────────────────────────────

const userImages = {};
let managerFilter = 'all';
let adminPassword = '';
let mode = 'letters';
let questions = [], qIndex = 0, score = 0, answered = false;

// Hide setup banner once Worker URL is configured
if (WORKER_URL !== "https://script.google.com/macros/s/AKfycbwjbtYUqOzpH4inxXGBZoROkMPSl76-gT8g42Ed5VVpKm38KEIYO5U0qoiBoXr3Q7MXQQ/exec") {
  document.getElementById('configBanner').style.display = 'none';
}

// ── SVG hand drawing helpers ──────────────────────────────────────────────────
function wrist(c,s){return`<rect x="38" y="118" width="44" height="18" rx="6" fill="${c}" stroke="${s}" stroke-width="2"/>`;}
function palm(c,s){return`<ellipse cx="60" cy="95" rx="32" ry="28" fill="${c}" stroke="${s}" stroke-width="2"/>`;}
function finger(x,tipY,baseY,w,bent,c,s){const h=baseY-tipY,bo=bent*h*0.75;if(bent>0.7)return`<path d="M${x-w},${baseY} Q${x-w},${baseY-h*0.4+bo} ${x},${baseY-h*0.25+bo} Q${x+w*1.5},${baseY-h*0.15+bo} ${x+w},${baseY+4}" fill="${c}" stroke="${s}" stroke-width="1.8" stroke-linejoin="round"/>`;return`<rect x="${x-w}" y="${tipY+bo}" width="${w*2}" height="${h-bo}" rx="${w}" fill="${c}" stroke="${s}" stroke-width="1.8"/>`;}
function thumb(side,bent,c,s){if(side==='right'){if(bent>0.7)return`<path d="M88,90 Q95,85 92,78 Q89,72 84,75 Q79,78 82,88 Z" fill="${c}" stroke="${s}" stroke-width="1.8"/>`;return`<path d="M88,90 Q100,85 102,72 Q104,60 96,58 Q88,56 84,65 Q80,75 84,85 Z" fill="${c}" stroke="${s}" stroke-width="1.8"/>`;}else{if(bent>0.7)return`<path d="M32,90 Q25,85 28,78 Q31,72 36,75 Q41,78 38,88 Z" fill="${c}" stroke="${s}" stroke-width="1.8"/>`;return`<path d="M32,90 Q20,85 18,72 Q16,60 24,58 Q32,56 36,65 Q40,75 36,85 Z" fill="${c}" stroke="${s}" stroke-width="1.8"/>`;}};
function buildHand({f1=0,f2=0,f3=0,f4=0,thumbBent=0,thumbSide='right',spread=false,label=''}){const sk='#F5C89A',st='#7A5230',xs=spread?[42,52,62,72,82]:[43,53,62,71,80],bents=[f4,f3,f2,f1],aXs=[xs[0],xs[1],xs[2],xs[3]],tips=[42,38,34,36],bases=[88,86,84,85];let s=`<svg viewBox="0 0 120 140" width="120" height="140" xmlns="http://www.w3.org/2000/svg" aria-label="ASL sign for ${label}">`;s+=wrist(sk,st);s+=palm(sk,st);for(let i=0;i<4;i++)if(bents[i]>0.5)s+=finger(aXs[i],tips[i],bases[i],7,bents[i],sk,st);for(let i=0;i<4;i++)if(bents[i]<=0.5)s+=finger(aXs[i],tips[i],bases[i],7,bents[i],sk,st);s+=thumb(thumbSide||'right',thumbBent,sk,st);s+=`<path d="M38,88 Q60,82 82,88" fill="none" stroke="${st}" stroke-width="1" opacity="0.4"/>`;s+='</svg>';return s;}

const SIGNS = {
  A:{f1:1,f2:1,f3:1,f4:1,thumbBent:0,hint:'Fist, thumb on side'},
  B:{f1:0,f2:0,f3:0,f4:0,thumbBent:1,hint:'Flat hand, thumb tucked'},
  C:{f1:0.4,f2:0.3,f3:0.3,f4:0.4,thumbBent:0,spread:true,hint:'Curved like C'},
  D:{f1:0,f2:1,f3:1,f4:1,thumbBent:0,hint:'Index up, others curl'},
  E:{f1:0.8,f2:0.8,f3:0.8,f4:0.8,thumbBent:1,hint:'All fingers bent'},
  F:{f1:1,f2:0,f3:0,f4:0,thumbBent:0,hint:'Index+thumb circle'},
  G:{f1:0,f2:1,f3:1,f4:1,thumbBent:0,thumbSide:'left',hint:'Pointing sideways'},
  H:{f1:0,f2:0,f3:1,f4:1,thumbBent:1,hint:'Index+middle pointing'},
  I:{f1:1,f2:1,f3:1,f4:0,thumbBent:1,hint:'Pinky finger raised'},
  J:{f1:1,f2:1,f3:1,f4:0,thumbBent:1,hint:'Pinky up, draw J'},
  K:{f1:0,f2:0,f3:1,f4:1,thumbBent:0,spread:true,hint:'Index+middle up spread'},
  L:{f1:0,f2:1,f3:1,f4:1,thumbBent:0,thumbSide:'left',hint:'L shape'},
  M:{f1:0.9,f2:0.9,f3:0.9,f4:1,thumbBent:0.5,hint:'3 fingers over thumb'},
  N:{f1:0.9,f2:0.9,f3:1,f4:1,thumbBent:0.5,hint:'2 fingers over thumb'},
  O:{f1:0.5,f2:0.5,f3:0.5,f4:0.5,thumbBent:0.4,hint:'All curve to O'},
  P:{f1:0,f2:1,f3:1,f4:1,thumbBent:0,hint:'Like K pointing down'},
  Q:{f1:0,f2:1,f3:1,f4:1,thumbBent:0,thumbSide:'left',hint:'Index+thumb down'},
  R:{f1:0,f2:0,f3:1,f4:1,thumbBent:1,hint:'Index+middle crossed'},
  S:{f1:0.9,f2:0.9,f3:0.9,f4:0.9,thumbBent:0.3,hint:'Fist, thumb over fingers'},
  T:{f1:0.9,f2:0.9,f3:0.9,f4:0.9,thumbBent:0,hint:'Thumb between fingers'},
  U:{f1:0,f2:0,f3:1,f4:1,thumbBent:1,hint:'Index+middle together up'},
  V:{f1:0,f2:0,f3:1,f4:1,thumbBent:1,spread:true,hint:'Peace sign'},
  W:{f1:0,f2:0,f3:0,f4:1,thumbBent:1,spread:true,hint:'3 fingers up+spread'},
  X:{f1:0.5,f2:1,f3:1,f4:1,thumbBent:1,hint:'Hooked index finger'},
  Y:{f1:1,f2:1,f3:1,f4:0,thumbBent:0,thumbSide:'left',hint:'Thumb+pinky extended'},
  Z:{f1:0,f2:1,f3:1,f4:1,thumbBent:1,hint:'Index draws Z in air'},
  0:{f1:0.5,f2:0.5,f3:0.5,f4:0.5,thumbBent:0.4,hint:'O shape'},
  1:{f1:0,f2:1,f3:1,f4:1,thumbBent:1,hint:'Index finger up'},
  2:{f1:0,f2:0,f3:1,f4:1,thumbBent:1,spread:true,hint:'2 fingers up'},
  3:{f1:0,f2:0,f3:0,f4:1,thumbBent:0,hint:'3 fingers + thumb'},
  4:{f1:0,f2:0,f3:0,f4:0,thumbBent:1,hint:'4 fingers up'},
  5:{f1:0,f2:0,f3:0,f4:0,thumbBent:0,spread:true,hint:'All 5 fingers spread'},
  6:{f1:1,f2:0,f3:0,f4:0,thumbBent:0,hint:'Pinky+thumb touch'},
  7:{f1:0,f2:1,f3:0,f4:0,thumbBent:0,hint:'Ring+thumb touch'},
  8:{f1:0,f2:0,f3:1,f4:0,thumbBent:0,hint:'Middle+thumb touch'},
  9:{f1:0,f2:0,f3:0,f4:1,thumbBent:0,hint:'Index+thumb circle'},
};

// ── API calls ─────────────────────────────────────────────────────────────────
async function loadImages() {
  if (WORKER_URL === "YOUR_WORKER_URL") return;
  try {
    const res = await fetch(`${WORKER_URL}/images`);
    const data = await res.json();
    Object.assign(userImages, data);
  } catch(e) { console.warn('Could not load images from backend', e); }
}

async function uploadImage(key, file) {
  const res = await fetch(`${WORKER_URL}/upload/${encodeURIComponent(key)}`, {
    method: 'POST',
    headers: { 'Content-Type': file.type, 'X-Admin-Password': adminPassword },
    body: file,
  });
  return res.json();
}

async function deleteImage(key) {
  const res = await fetch(`${WORKER_URL}/image/${encodeURIComponent(key)}`, {
    method: 'DELETE',
    headers: { 'X-Admin-Password': adminPassword },
  });
  return res.json();
}

// ── Quiz logic ────────────────────────────────────────────────────────────────
function getPool(){return Object.keys(SIGNS).filter(k=>mode==='letters'?isNaN(k):!isNaN(k));}
function buildQuestions(){const pool=getPool();return[...pool].sort(()=>Math.random()-0.5).slice(0,10).map(key=>{const wrong=pool.filter(k=>k!==key).sort(()=>Math.random()-0.5).slice(0,3);return{key,choices:[...wrong,key].sort(()=>Math.random()-0.5)};});}

function setMode(m){mode=m;document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));document.getElementById(m==='letters'?'tabLetters':'tabNumbers').classList.add('active');renderImgGrid();startQuiz();}

function startQuiz(){questions=buildQuestions();qIndex=0;score=0;answered=false;renderQuestion();}

function renderQuestion(){
  const area=document.getElementById('quizArea');
  if(qIndex>=questions.length){renderResult(area);return;}
  const {key,choices}=questions[qIndex];
  const cfg={...SIGNS[key],label:key};
  const pct=Math.round(qIndex/questions.length*100);
  const imgSrc=userImages[key];
  const visual=imgSrc
    ?`<div class="sign-image-area"><img src="${imgSrc}" alt="ASL sign for ${key}"/></div>`
    :`<div class="sign-image-area">${buildHand(cfg)}</div>`;
  area.innerHTML=`
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="status-row">
      <span class="status-label">Question ${qIndex+1} of ${questions.length}</span>
      <span class="score-badge">${score} correct</span>
    </div>
    <div class="sign-card">
      ${visual}
      <p class="sign-question">What sign is this?</p>
      <p class="hint-text">${imgSrc?cfg.hint:'SVG illustration — upload a photo in "Manage images"'}</p>
    </div>
    <div class="choices-grid" id="choicesGrid">
      ${choices.map(c=>`<button class="choice-btn" data-key="${c}" onclick="answer(this,'${c}','${key}')">${c}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">${qIndex+1<questions.length?'Next question →':'See results →'}</button>
  `;
}

function answer(btn,chosen,correct){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true;if(b.getAttribute('data-key')===correct)b.className='choice-btn correct';});
  if(chosen!==correct)btn.className='choice-btn wrong';
  const fb=document.getElementById('feedback');
  if(chosen===correct){score++;fb.textContent='✓ Correct!';fb.className='feedback correct';}
  else{fb.textContent=`✗ Wrong — the correct answer is ${correct}`;fb.className='feedback wrong';}
  document.getElementById('nextBtn').style.display='block';
}

function nextQ(){qIndex++;answered=false;renderQuestion();}

function renderResult(area){
  const pct=Math.round(score/questions.length*100);
  const emoji=pct>=90?'🏆':pct>=70?'👍':pct>=50?'💪':'📖';
  const msg=pct>=90?"Excellent! You're signing fluently.":pct>=70?'Great job — keep practicing!':pct>=50?'Good effort — try again to improve.':'Keep learning — practice makes perfect!';
  area.innerHTML=`<div class="result-card"><div style="font-size:48px;margin-bottom:1rem">${emoji}</div><div class="result-score">${score}/${questions.length}</div><div class="result-label">${pct}% correct</div><div class="result-msg">${msg}</div><button class="restart-btn" onclick="startQuiz()">Try again</button></div>`;
}

// ── Image manager ─────────────────────────────────────────────────────────────
function toggleManager(){
  const m=document.getElementById('imgManager');
  const btn=document.getElementById('manageBtn');
  const open=m.style.display==='none';
  m.style.display=open?'block':'none';
  btn.textContent=open?'Hide manager':'Manage images';
  if(open)renderImgGrid();
}

function savePassword(){
  adminPassword=document.getElementById('pwInput').value;
  document.getElementById('pwStatus').textContent='Password saved — try uploading an image to test it.';
  document.getElementById('pwStatus').className='pw-status ok';
}

function setFilter(f,el){
  managerFilter=f;
  document.querySelectorAll('.filter-tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderImgGrid();
}

function renderImgGrid(){
  const grid=document.getElementById('imgGrid');
  if(!grid)return;
  const allKeys=Object.keys(SIGNS);
  let keys=allKeys;
  if(managerFilter==='letters')keys=allKeys.filter(k=>isNaN(k));
  else if(managerFilter==='numbers')keys=allKeys.filter(k=>!isNaN(k));
  else if(managerFilter==='missing')keys=allKeys.filter(k=>!userImages[k]);
  grid.innerHTML=keys.map(k=>{
    const hasImg=!!userImages[k];
    return`<div class="img-slot ${hasImg?'has-image':''}" id="slot-${k}" onclick="triggerUpload('${k}')" title="${hasImg?'Click to replace':'Upload image for '+k}">
      ${hasImg?`<img src="${userImages[k]}" alt="${k}"/>`:'<span style="font-size:18px;color:#d1d5db">+</span>'}
      <span class="slot-label">${k}</span>
      ${hasImg?`<button class="remove-btn" onclick="removeImg(event,'${k}')">×</button>`:''}
    </div>`;
  }).join('');
  updateImgCount();
}

function updateImgCount(){
  const el=document.getElementById('imgCount');
  if(el){const n=Object.keys(userImages).length;el.textContent=`${n} / ${Object.keys(SIGNS).length} uploaded`;}
}

function triggerUpload(key){
  if(!adminPassword){alert('Enter your admin password first.');return;}
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    const slot=document.getElementById(`slot-${key}`);
    if(slot){slot.innerHTML=`<div class="uploading-overlay">Uploading...</div><span class="slot-label">${key}</span>`;}
    const result=await uploadImage(key,file);
    if(result.error){
      alert(result.error==='Incorrect password'?'Wrong password — check and try again.':'Upload failed: '+result.error);
    } else {
      userImages[key]=result.url;
    }
    renderImgGrid();
    renderQuestion();
  };
  inp.click();
}

async function removeImg(e,key){
  e.stopPropagation();
  if(!adminPassword){alert('Enter your admin password first.');return;}
  const result=await deleteImage(key);
  if(result.error){alert('Delete failed: '+result.error);return;}
  delete userImages[key];
  renderImgGrid();
  renderQuestion();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Admin panel is hidden by default. Access it by adding ?admin to the URL:
// e.g. https://your-quiz.pages.dev/?admin
const isAdmin = window.location.search.includes('admin');
if (isAdmin) document.getElementById('imgManager').style.display = 'block';

loadImages().then(()=>{ startQuiz(); if(isAdmin) renderImgGrid(); });
</script>
